name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push data-sync
        uses: docker/build-push-action@v6
        with:
          context: ./data-sync
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/keitracker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/keitracker:${{ github.sha }}
          cache-from: type=gha,scope=data-sync
          cache-to: type=gha,scope=data-sync,mode=max

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/keitracker-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/keitracker-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/keitracker-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/keitracker-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
